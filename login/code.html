<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LifeLink - Save a Life</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

          extend: {
            colors: {
              "secondary-fixed": "#cfe6f2",
              "surface-container-low": "#f3f3f5",
              "surface-variant": "#e2e2e4",

              "inverse-surface": "#2f3132",
              "error": "#ba1a1a",
              "on-primary": "#ffffff",
              "surface-dim": "#d9dadc",
              "surface-tint": "#b91d1d",

              "outline-variant": "#e4beb9",

              "on-secondary-container": "#526772",
              "secondary": "#4c616c",
              "on-surface-variant": "#5b403d",
              "on-background": "#1a1c1d",

            fontFamily: {

              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .vital-pulse-bg {
            background: linear-gradient(135deg, #b71c1c 0%, #91000a 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative min-h-screen flex flex-col items-center justify-between vital-pulse-bg overflow-hidden">
<!-- Decorative Background Elements (Organic Layering) -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[60%] h-[60%] bg-white/5 rounded-full blur-[120px]"></div>
<div class="absolute top-[20%] -right-[20%] w-[80%] h-[80%] bg-primary-container/20 rounded-full blur-[140px]"></div>
<div class="absolute bottom-0 left-0 w-full h-[50%] bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<!-- Content Canvas -->
<div class="relative z-10 w-full max-w-md mx-auto px-8 pt-24 pb-16 flex-1 flex flex-col justify-between">
<!-- Logo & Brand Identity -->
<div class="flex flex-col items-center text-center space-y-6">
<div class="w-24 h-24 rounded-3xl bg-white shadow-2xl flex items-center justify-center p-1">
<div class="w-full h-full rounded-[20px] bg-gradient-to-br from-primary-container to-primary flex items-center justify-center">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">bloodtype</span>
</div>
</div>
<div class="space-y-2">
<h1 class="font-headline font-black text-4xl tracking-tighter text-white">LifeLink</h1>
<div class="flex items-center justify-center space-x-2">
<span class="h-px w-8 bg-white/30"></span>
<span class="font-headline font-bold text-sm tracking-widest text-on-primary-container uppercase">The Vital Pulse</span>
<span class="h-px w-8 bg-white/30"></span>
</div>
</div>
</div>
<!-- Visual Editorial Image (Optional Hero Overlay) -->
<div class="my-12 relative group">
<div class="absolute inset-0 bg-primary-container blur-2xl opacity-20 scale-95 group-hover:scale-100 transition-transform duration-700"></div>
<div class="relative rounded-2xl overflow-hidden shadow-2xl aspect-[4/3]">
<img alt="LifeLink Hero" class="w-full h-full object-cover grayscale-[20%] contrast-[1.1]" data-alt="Close up of a medical professional holding a red life-saving blood donation bag in a sterile sunlit environment with soft bokeh" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZAO-9Cxf4YwsResRDYnoYFmuP4k8vIJl2YMZ3ZROGWg-SG1CjA7UtUZpc-qflXWwNOKgLiCUbYuBVG3YFwI8VoQDoS6Z_nKFFEhcghU4nwlmOoo_dnkQ1CbxJlrQ7szGc4Cz1IrLl0k38VTpEl72iSWYcJ2F65jlIZkO_S6j5NMCeslp23jc-GcOjhz0-R6u89QOz3XLPszo5PFGlyF3y6CWciXPrNaaPno6TYTQfdd8Fjg43fWni65JRY6wIfE3Qc7QylXjgJ1nM"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/60 via-transparent to-transparent"></div>
</div>
</div>
<!-- Headlines & Copy -->
<div class="space-y-4 text-center">
<h2 class="font-headline font-extrabold text-3xl leading-tight text-white px-2">
                    Save a Life,<br/>Donate Blood
                </h2>
<p class="text-on-primary-container text-lg font-medium leading-relaxed opacity-90 px-4">
                    A real-time platform connecting donors and requesters in your area.
                </p>
</div>
<!-- Action Cluster -->
<div class="mt-12 space-y-4 w-full">
<!-- Primary Action -->
<button class="w-full h-16 bg-white text-primary font-headline font-extrabold text-lg rounded-2xl shadow-xl active:scale-[0.98] transition-all duration-200 flex items-center justify-center space-x-2">
<span>Get Started</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Secondary Action (Glassmorphism) -->
<button class="w-full h-16 glass-effect text-white font-headline font-bold text-lg rounded-2xl border border-white/20 active:scale-[0.98] transition-all duration-200 flex items-center justify-center">
                    Log In
                </button>
</div>
<!-- Footer Meta (Optional) -->
<div class="mt-8 text-center">
<p class="text-white/40 text-xs font-semibold tracking-widest uppercase flex items-center justify-center space-x-2">
<span class="material-symbols-outlined text-[14px]">verified_user</span>
<span>Secure &amp; Verified Platform</span>
</p>
</div>
</div>
<!-- Progress Indicator for Splash/Onboarding -->
<div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex space-x-2">
<div class="w-8 h-1 bg-white rounded-full"></div>
<div class="w-2 h-1 bg-white/30 rounded-full"></div>
<div class="w-2 h-1 bg-white/30 rounded-full"></div>
</div>
</main>
</body></html>
